global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']

  - job_name: 'postgres'
    static_configs:
      - targets: ['titan-postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['titan-redis:6379']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['titan-rabbitmq:15672']

  - job_name: 'ollama'
    static_configs:
      - targets: ['titan-ollama:11434']
