name: Docker Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
  workflow_dispatch:

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          cd docker
          docker compose config

  test-services:
    runs-on: ubuntu-latest
    needs: validate-compose
    steps:
      - uses: actions/checkout@v4

      - name: Start core services
        run: |
          cd docker
          docker compose up -d postgres redis rabbitmq
          sleep 30

      - name: Test Postgres
        run: |
          cd docker
          docker compose exec -T postgres pg_isready -U titan

      - name: Test Redis
        run: |
          cd docker
          docker compose exec -T redis redis-cli -a titan_redis_2026 ping

      - name: Test RabbitMQ
        run: |
          cd docker
          docker compose exec -T rabbitmq rabbitmq-diagnostics ping

      - name: Cleanup
        run: |
          cd docker
          docker compose down -v
