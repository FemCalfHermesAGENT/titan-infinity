name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ######################################################################
  # JOB 1: Lint — ruff check + ruff format --check
  ######################################################################
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.5

      - name: Run ruff linter
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

  ######################################################################
  # JOB 2: Test — pytest with coverage
  ######################################################################
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(ls -A tests)" ]; then
            pytest --cov=src --cov-report=xml --cov-report=term-missing
          else
            echo "No tests directory or empty — skipping"
          fi

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  ######################################################################
  # JOB 3: Build — verify pyproject.toml is valid
  ######################################################################
  build:
    name: Build (pyproject.toml)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Verify build
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir /tmp/build
          echo "pyproject.toml is valid and builds successfully"
